ai_usage_summary: |
  Used Claude for architecture design discussion, code generation, debugging,
  and step-by-step guidance throughout the build. All code was reviewed,
  tested, and verified against the real candidate dataset before being
  committed. No candidate data was sent to any LLM API as part of the
  ranking pipeline itself -- the final rank.py uses zero network calls and
  zero LLM calls at runtime, only Python standard library logic.

methodology_summary: |
  Rule-based ranker with explicit, fact-grounded reasoning capture. Five
  weighted scoring dimensions (skills match, experience fit, credentials,
  career growth, platform/behavioral signals) derived directly from the job
  description's stated must-haves and disqualifiers. Hard disqualifier
  penalties (multiplicative, not absolute zero) catch consulting-only
  careers, research-only backgrounds, honeypot skill/duration mismatches,
  and the central keyword-stuffer trap: a non-technical title with no real
  AI/ML signal in career history, regardless of listed skill keywords.
  Verified on the full 100,000-candidate pool: 18-28 second runtime
  (well under the 5-minute limit), 0% honeypot leakage and 0% keyword-stuffer
  leakage in the top 100 shortlist, confirmed independently on two machines.

declarations:
  read_submission_spec: true
